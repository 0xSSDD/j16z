services:
  postgres:
    image: postgres:16-alpine
    container_name: j16z-test-postgres
    environment:
      POSTGRES_DB: j16z_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d j16z_test']
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    volumes:
      - j16z-test-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: j16z-test-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s
    volumes:
      - j16z-test-redis-data:/data

volumes:
  j16z-test-postgres-data:
  j16z-test-redis-data:
